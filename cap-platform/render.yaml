services:
  - type: web
    name: cap-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_API_URL
        value: https://api.minimax.chat/v1/text/chatcompletion_v2
      - key: MINIMAX_MODEL
        value: MiniMax-Text-01
